<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Sorting Visualiser</title>
    <link rel="stylesheet" href="searching.css">
</head>
<body>

    <div class="wrapper">
    <h1>Searching Visualiser</h1>


    <div class="card">

        <div class="controls">
            <div class="control">
                <label for="algo">Algorithm : </label>
                <select id="algo">
                <option value="linear">Linear Search</option>
                <option value="binary">Binary Search</option>
                </select>
            </div>
            
            <div class="control">
                <label>Array Size : <span id="sizeVal">30</span></label>
                <input type="range" id="size" min="10" max="50" value="10">
            </div>
            <div class="control">
                <label>Speed : <span id="speedVal">30</span></label>
                <input type="range" id="speed" min="1" max="100" value="1">
            </div>

            <div class="control">
                <label>Target</label>
                <input type="number" id="target" min="1" max="100"  placeholder="Enter value">
            </div>

            <button id="generate">Generate</button>
            <button id="start"> Start Searching </button>
        </div>

        <div class="main">
            <div class="menu">
                <div class="playControls">
                    <button id="pause">Pause</button>
                    <button id="reset">Reset</button>
                </div>

                <div id="legend" class="legend">

                    <div class="legend-item">
                        <span class="color red"></span>
                        <span>Currently checking</span>
                    </div>

                    <div class="legend-item">
                        <span class="color yellow"></span>
                        <span>already checked </span>
                    </div>

                    <div class="legend-item">
                        <span class="color green"></span>
                        <span>found</span>
                    </div>
                </div>

            </div>

                <div class="content">
                    <div class="container"></div>
                    <div class="info">
                        <div class="info-card">
                            <div id="algorithmInfo"></div>
                        </div>
                       <div class="stats">
                        <h3>📊 Live Statistics</h3>
                        <div class="stat">
                            <span>⚖ Comparisons</span>
                            <span id="comparisons">0</span>
                        </div>
                        <div class="stat">
                            <span>👉🏻 CurrentIndex</span>
                            <span id="index">0</span>
                        </div>

                        <div class="stat">
                            <span>⏱ Time</span>
                            <span id="time">0.00 s</span>
                        </div>

                        <div class="stat">
                            <span>🟢 Status</span>
                            <span id="status">Ready</span>
                        </div>
                    </div>
                </div>
            </div>
            </div>

        </div>

        
        <div id="popup" class="popup hidden">
            <h2 id="popupTitle"></h2>
            <p id="popupIdea"></p>
            <p id="popupNext"></p>
            <button id="closePopup">Close</button>
    </div>

</div>

    
    <script src="searching.js"></script>

    </body>
    
</html>
